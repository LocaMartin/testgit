name: Trusted PR Pages Deploy Boundary Probe

on:
  workflow_run:
    workflows:
      - PR Pages Artifact Upload Probe
    types:
      - completed

permissions:
  contents: read

jobs:
  trusted-deploy-after-pr:
    if: ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Record triggering PR run
        run: |
          echo "trigger_run_id=${{ github.event.workflow_run.id }}"
          echo "trigger_head_repository=${{ github.event.workflow_run.head_repository.full_name }}"
          echo "trigger_head_sha=${{ github.event.workflow_run.head_sha }}"

      - name: Deploy with no current-run artifact
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
